"""
Docker Compose for RAG Knowledge Retrieval Platform

包含：
- RAG API 服务
- Milvus 向量数据库
- Elasticsearch
- Redis（可选，用于缓存）

@author lvdaxianerplus
@date 2026-04-16
"""

version: '3.8'

services:
  # RAG API 服务
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      # LLM 配置
      - MODEL_NAME=${MODEL_NAME:-qwen3.6-plus}
      - MODEL_API_KEY=${MODEL_API_KEY:-}
      - MODEL_REQUEST_URL=${MODEL_REQUEST_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      # Embedding 配置
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-text-embedding-v4}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_REQUEST_URL=${EMBEDDING_REQUEST_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-2048}
      # Milvus 配置
      - EMBEDDING_STORE_HOST=milvus:19530
      - EMBEDDING_STORE_DB_NAME=${MILVUS_DB:-studio}
      # Rerank 配置
      - RERANK_MODEL_NAME=${RERANK_MODEL_NAME:-qwen3-rerank}
      - RERANK_API_KEY=${RERANK_API_KEY:-}
      - RERANK_REQUEST_URL=${RERANK_REQUEST_URL:-https://dashscope.aliyuncs.com/compatible-api/v1/reranks}
      # ES 配置
      - ES_HOST=elasticsearch:9200
      - ES_USERNAME=${ES_USERNAME:-elastic}
      - ES_PASSWORD=${ES_PASSWORD:-elasticuser}
      - ES_SCHEME=${ES_SCHEME:-http}
      - ES_SKILL_INDEX=${ES_SKILL_INDEX:-rag_skills}
      - ES_ASSET_INDEX=${ES_ASSET_INDEX:-rag_assets}
      # 缓存配置
      - EMBEDDING_CACHE_TTL=${EMBEDDING_CACHE_TTL:-86400}
      - EMBEDDING_CACHE_MAX_SIZE=${EMBEDDING_CACHE_MAX_SIZE:-1000}
      - RERANK_CACHE_TTL=${RERANK_CACHE_TTL:-3600}
      - RERANK_CACHE_MAX_SIZE=${RERANK_CACHE_MAX_SIZE:-500}
      # 日志配置
      - LOG_DIR=/app/logs
      - APP_NAME=rag-api
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./logs:/app/logs
    depends_on:
      milvus:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - rag-network
    restart: unless-stopped

  # Milvus 向量数据库
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - milvus-etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2379/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus-minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.3.3
    container_name: milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Elasticsearch (with IK Analyzer for Chinese)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - ELASTIC_PASSWORD=elasticuser
      - xpack.security.http.ssl.enabled=false
    # 安装 IK 中文分词器插件
    command: >
      bash -c "
        bin/elasticsearch-plugin install --batch analysis-ik &&
        bin/elasticsearch
      "
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
      # 挂载同义词文件
      - ./synonyms.txt:/usr/share/elasticsearch/config/synonyms.txt:ro
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  milvus-etcd-data:
  milvus-minio-data:
  milvus-data:
  es-data:

networks:
  rag-network:
    driver: bridge